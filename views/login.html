<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aegis – Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:#ffffff;
    --panel:#f4f4f4;
    --border:#dddddd;
    --text:#222222;
    --muted:#666666;
    --pink:#ff5fa2;
    --pink-light:#ffe1ee;
  }

  * { box-sizing:border-box; font-family:'Roboto', Arial, Helvetica, sans-serif; }

  html, body {
    margin:0;
    height:100%;
  }

  /* LIQUID GLASS BACKDROP */
  body {
    background:
      radial-gradient(circle at 15% 20%, rgba(255,95,162,0.55), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(120,170,255,0.5), transparent 50%),
      radial-gradient(circle at 25% 85%, rgba(255,210,120,0.45), transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(160,120,255,0.5), transparent 50%),
      linear-gradient(135deg, #eef1ff, #ffe9f4);
    display:flex;
    justify-content:center;
    align-items:center;
  }

  /* PHONE FRAME */
  .app {
    width:360px;
    height:720px;
    border-radius:32px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(28px) saturate(160%);
    -webkit-backdrop-filter:blur(28px) saturate(160%);
    border:1px solid rgba(255,255,255,0.65);
    box-shadow:
      0 20px 60px rgba(31,38,135,0.25),
      inset 0 1px 1px rgba(255,255,255,0.8),
      inset 0 -1px 12px rgba(255,255,255,0.25);
  }

  /* GLASS HIGHLIGHT BLOBS */
  .app::before {
    content:"";
    position:absolute;
    top:-60px;
    left:-60px;
    width:220px;
    height:220px;
    background:radial-gradient(circle, rgba(255,255,255,0.85), transparent 70%);
    filter:blur(10px);
    opacity:0.6;
    pointer-events:none;
  }

  .app::after {
    content:"";
    position:absolute;
    bottom:-80px;
    right:-60px;
    width:260px;
    height:260px;
    background:radial-gradient(circle, rgba(255,95,162,0.35), transparent 70%);
    filter:blur(20px);
    pointer-events:none;
  }

  .content {
    flex:1;
    padding:32px 32px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    position:relative;
    z-index:1;
  }

  .title {
    text-align:center;
    font-size:28px;
    font-weight:500;
    margin-bottom:4px;
    color:var(--text);
    text-shadow:0 1px 0 rgba(255,255,255,0.6);
  }

  .subtitle {
    text-align:center;
    font-size:13px;
    color:var(--muted);
    margin-bottom:32px;
  }

  /* GLASS PILL INPUTS */
  .field {
    position:relative;
    margin-bottom:16px;
  }

  .field input {
    width:100%;
    padding:16px 18px 8px;
    border-radius:30px;
    border:1px solid rgba(255,255,255,0.7);
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    font-size:14px;
    color:var(--text);
    box-shadow:inset 0 1px 2px rgba(255,255,255,0.6), 0 2px 8px rgba(31,38,135,0.06);
    outline:none;
    transition:border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .field input:focus {
    border-color:var(--pink);
    box-shadow:inset 0 1px 2px rgba(255,255,255,0.6), 0 0 0 3px rgba(255,95,162,0.18);
  }

  .field label {
    position:absolute;
    left:18px;
    top:14px;
    font-size:14px;
    color:var(--muted);
    pointer-events:none;
    transition:all 0.15s ease;
    background:transparent;
  }

  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    top:4px;
    font-size:10px;
    color:var(--pink);
    font-weight:500;
  }

  .toggle-visibility {
    position:absolute;
    right:16px;
    top:14px;
    font-size:16px;
    cursor:pointer;
    color:var(--muted);
    user-select:none;
    background:none;
    border:none;
  }

  .forgot {
    text-align:right;
    font-size:13px;
    font-weight:500;
    margin-top:12px;
    margin-bottom:12px;
  }

  .forgot a {
    color:var(--pink);
    text-decoration:none;
  }

  /* GLASS BUTTON WITH SHEEN */
  .btn {
    padding:14px;
    border-radius:30px;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    border:none;
    position:relative;
    overflow:hidden;
  }

  .login-btn {
    background:linear-gradient(135deg, #ff8fc0, var(--pink));
    color:#fff;
    margin-top:16px;
    box-shadow:0 8px 20px rgba(255,95,162,0.45), inset 0 1px 1px rgba(255,255,255,0.5);
  }

  .login-btn::after {
    content:"";
    position:absolute;
    top:0;
    left:-40%;
    width:40%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.55), transparent);
    transform:skewX(-20deg);
  }

  .back {
    margin-top:18px;
    text-align:center;
    font-size:13px;
    display:flex;
    justify-content:center;
    gap:4px;
  }

  .back a {
    color:var(--pink);
    text-decoration:none;
    font-weight:500;
  }

  .footer {
    text-align:center;
    font-size:12px;
    color:var(--muted);
    margin-top:28px;
  }

  .progress {
    display:none;
    margin:16px auto 0;
    width:22px;
    height:22px;
    border-radius:50%;
    border:3px solid rgba(255,95,162,0.25);
    border-top-color:var(--pink);
    animation:spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform:rotate(360deg); }
  }
</style>
</head>

<body>
<div class="app">

  <div class="content">
    <div class="title">Aegis</div>
    <div class="subtitle">Sign in to your account</div>

    <div class="field">
      <input id="etEmail" type="email" placeholder=" ">
      <label for="etEmail">Email</label>
    </div>

    <div class="field">
      <input id="etPassword" type="password" placeholder=" ">
      <label for="etPassword">Password</label>
      <button type="button" class="toggle-visibility" onclick="togglePassword()">👁</button>
    </div>

    <div class="forgot">
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn login-btn" onclick="loginUser()">
      Login
    </button>

    <div class="back">
      <span>No account?</span>
      <a href="register.html">Register</a>
    </div>

    <div class="progress" id="progress"></div>

    <div class="footer"></div>
  </div>

</div>
</body>
<script>
function togglePassword() {
  const input = document.getElementById('etPassword');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function loginUser() {
  document.getElementById('progress').style.display = 'block';
  window.location.href = "dashboard.html";
}
</script>
</html>
